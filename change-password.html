<html>
<head>
  <title>Change Password — AI Timetable Planner</title>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-950:#05090f; --navy-900:#0a1220; --navy-800:#0f1e35;
      --gold-400:#f0c060; --gold-300:#f5d080;
      --slate-400:#8fa3be; --slate-300:#b5c7d8; --white:#f0f4f8;
      --red-400:#e05c5c; --green-400:#4ec994; --blue-400:#5ba3d9;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'IBM Plex Sans',sans-serif;
      --font-mono:'IBM Plex Mono',monospace;
      --radius:12px; --radius-sm:6px; --t:0.22s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--navy-950);color:var(--white);
         min-height:100vh;display:flex;flex-direction:column;align-items:center;
         justify-content:center;padding:24px;animation:pageFadeIn .35s ease both;}
    @keyframes pageFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 55% at 10% 10%,rgba(35,66,120,0.35) 0%,transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 85%,rgba(200,150,42,0.08) 0%,transparent 55%);}

    .card{position:relative;z-index:1;width:100%;max-width:420px;
          background:var(--navy-900);border:1px solid rgba(240,192,96,0.14);
          border-radius:var(--radius);overflow:hidden;
          box-shadow:0 32px 80px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.05) inset;}
    .card-accent{height:3px;background:linear-gradient(90deg,var(--gold-400),var(--gold-300));}
    .card-body{padding:40px 36px 36px;}

    .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;
             text-transform:uppercase;color:var(--gold-400);margin-bottom:8px;}
    .card-title{font-family:var(--font-display);font-size:28px;font-weight:700;
                color:var(--white);margin-bottom:6px;}
    .user-badge{display:inline-flex;align-items:center;gap:8px;
                padding:7px 14px;border-radius:20px;font-size:13px;
                font-family:var(--font-mono);margin-bottom:28px;}
    .badge-head{background:rgba(240,192,96,0.1);color:var(--gold-400);
                border:1px solid rgba(240,192,96,0.22);}
    .badge-teacher{background:rgba(78,201,148,0.1);color:var(--green-400);
                   border:1px solid rgba(78,201,148,0.22);}

    .field{margin-bottom:18px;}
    .field-label{font-size:11px;font-weight:500;text-transform:uppercase;
                 letter-spacing:.1em;color:var(--slate-400);margin-bottom:6px;display:block;}
    .field-input{width:100%;padding:12px 14px;background:var(--navy-800);
                 border:1px solid rgba(240,192,96,0.12);border-radius:var(--radius-sm);
                 color:var(--white);font-family:var(--font-body);font-size:14px;
                 outline:none;transition:border-color var(--t),box-shadow var(--t);}
    .field-input::placeholder{color:var(--slate-400);opacity:.6;}
    .field-input:focus{border-color:rgba(240,192,96,0.45);
                       box-shadow:0 0 0 3px rgba(240,192,96,0.08);}

    .strength-bar-wrap{height:3px;background:rgba(255,255,255,0.07);
                       border-radius:2px;margin-top:8px;overflow:hidden;}
    .strength-bar{height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s;}

    .strength-label{font-size:11px;margin-top:5px;color:var(--slate-400);}

    .msg-box{display:none;padding:10px 14px;border-radius:var(--radius-sm);
             font-size:13px;margin-bottom:14px;}
    .msg-box.ok {background:rgba(78,201,148,0.08);border:1px solid rgba(78,201,148,0.25);
                 color:var(--green-400);display:block;}
    .msg-box.err{background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.25);
                 color:var(--red-400);display:block;}

    .btn-submit{width:100%;padding:13px;background:var(--gold-400);color:var(--navy-950);
                border:none;border-radius:var(--radius-sm);font-family:var(--font-body);
                font-weight:700;font-size:15px;cursor:pointer;transition:all var(--t);
                display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
    .btn-submit:hover:not(:disabled){background:var(--gold-300);transform:translateY(-1px);
                                     box-shadow:0 8px 24px rgba(240,192,96,0.3);}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;}

    .back-row{text-align:center;margin-top:20px;font-size:13px;color:var(--slate-400);}
    .back-row a{color:var(--gold-400);text-decoration:none;font-weight:500;transition:color var(--t);}
    .back-row a:hover{color:var(--gold-300);}

    .spinner{width:16px;height:16px;border:2px solid rgba(5,9,15,0.3);
             border-top-color:var(--navy-950);border-radius:50%;
             animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .brand{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;
           text-transform:uppercase;color:rgba(143,163,190,0.3);
           margin-top:28px;text-align:center;}
  </style>
</head>
<body>

<div class="card">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="eyebrow">🔒 Account Security</div>
    <h1 class="card-title">Change Password</h1>

    <div class="user-badge" id="userBadge">—</div>

    <div class="msg-box" id="msgBox"></div>

    <div class="field">
      <label class="field-label" for="curPwd">Current Password</label>
      <input type="password" id="curPwd" class="field-input"
             placeholder="Enter your current password" />
    </div>

    <div class="field">
      <label class="field-label" for="newPwd">New Password</label>
      <input type="password" id="newPwd" class="field-input"
             placeholder="At least 6 characters"
             oninput="checkStrength(this.value)" />
      <div class="strength-bar-wrap">
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field">
      <label class="field-label" for="confPwd">Confirm New Password</label>
      <input type="password" id="confPwd" class="field-input"
             placeholder="Repeat your new password" />
    </div>

    <button class="btn-submit" id="submitBtn" onclick="doChange()">
      Update Password
    </button>

    <div class="back-row" style="margin-top:16px">
      <a href="index.html">← Back to timetables</a>
    </div>
  </div>
</div>

<div class="brand">✦ AI Timetable Planner · Academic Scheduling System</div>

<script>
const API = API_BASE;

document.addEventListener('DOMContentLoaded', () => {
  if (!requireLogin()) return;
  const u = getUser();
  const badge = document.getElementById('userBadge');
  const isH = isHead();
  badge.className = `user-badge ${isH ? 'badge-head' : 'badge-teacher'}`;
  badge.textContent = `${isH ? '✦ Head' : '✎ Teacher'} · ${u.display_name || u.username}`;
});

function checkStrength(val) {
  const bar   = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if (!val) { bar.style.width = '0%'; label.textContent = ''; return; }

  let score = 0;
  if (val.length >= 8)              score++;
  if (/[A-Z]/.test(val))           score++;
  if (/[0-9]/.test(val))           score++;
  if (/[^A-Za-z0-9]/.test(val))    score++;

  const levels = [
    { w: '20%',  bg: '#e05c5c', txt: 'Weak' },
    { w: '45%',  bg: '#e8904a', txt: 'Fair' },
    { w: '70%',  bg: '#f0c060', txt: 'Good' },
    { w: '100%', bg: '#4ec994', txt: 'Strong' },
  ];
  const lv = levels[Math.min(score, 3)];
  bar.style.width      = lv.w;
  bar.style.background = lv.bg;
  label.textContent    = lv.txt;
  label.style.color    = lv.bg;
}

async function doChange() {
  const cur  = document.getElementById('curPwd').value;
  const nw   = document.getElementById('newPwd').value;
  const conf = document.getElementById('confPwd').value;
  const btn  = document.getElementById('submitBtn');
  const msg  = document.getElementById('msgBox');

  msg.className = 'msg-box';
  msg.textContent = '';

  if (!cur)        { show('err', 'Please enter your current password.'); return; }
  if (!nw)         { show('err', 'Please enter a new password.'); return; }
  if (nw.length < 6){ show('err', 'New password must be at least 6 characters.'); return; }
  if (nw !== conf) { show('err', 'Passwords do not match.'); return; }
  if (cur === nw)  { show('err', 'New password must be different from your current one.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Updating…';

  try {
    const res  = await authFetch(`${API}/auth/change-password`, {
      method: 'POST',
      body:   JSON.stringify({ current_password: cur, new_password: nw }),
    });
    const data = await res.json();

    if (data.success) {
      show('ok', '✓ Password updated successfully! You can now use your new password.');
      document.getElementById('curPwd').value  = '';
      document.getElementById('newPwd').value  = '';
      document.getElementById('confPwd').value = '';
      document.getElementById('strengthBar').style.width = '0%';
      document.getElementById('strengthLabel').textContent = '';
    } else {
      show('err', data.error || 'Failed to update password. Please try again.');
    }
  } catch {
    show('err', 'Cannot reach server. Please try again.');
  }

  btn.disabled = false;
  btn.innerHTML = 'Update Password';
}

function show(type, text) {
  const el = document.getElementById('msgBox');
  el.textContent = text;
  el.className   = `msg-box ${type}`;
}
</script>
</body>
</html>
